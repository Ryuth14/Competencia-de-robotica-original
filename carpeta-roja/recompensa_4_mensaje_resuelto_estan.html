<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>El Laboratorio. Archivo #101 — Mensaje Descifrado</title>
</head>

<body>
    <section id="recompensa4_mensaje_resuelto">
        <img id="portada_laboratorio" class="portada_laboratorio"
            src="../Images/recompensas/carpeta-roja/pregunta-4/Lograste descifrar el mensaje pregunta 4 (espacio para el cartel).png"
            alt="Mensaje descifrado">

        <a class="salida_boton" href="../categorias.html"><img src="../Images/Salida_boton.png"
                alt="Botón para salir del juego" width="180"></a>
        <a href="pregunta_5.html"><img class="boton_siguiente" src="../Images/Boton_siguiente.png"
                alt="Botón para pasar a la siguiente pregunta" width="150" style="display: block;"></a>
    </section>

    <!-- Usamos un ID "opciones_descifrar_resuelto" para dar gaps/espacios diferentes según el fondo -->
    <div class="opciones_resuelto_contenedor" id="opciones_descifrar_resuelto">
        <div class="slot">
            <img class="opcion_a_base" src="../Images/recompensas/carpeta-roja/pregunta-4/Opcion creen (a).png" width="400"
                style="display: block;">
        </div>
        <div class="slot">
            <img class="opcion_b_correcto" src="../Images/recompensas/carpeta-roja/pregunta-4/Opcion estan correcta (b).png" width="400"
                style="display: block;">
        </div>
        <div class="slot">
            <img class="opcion_c_base" src="../Images/recompensas/carpeta-roja/pregunta-4/Opcion esten (c).png" width="400"
                style="display: block;">
        </div>
        <img class="cartel_correcto" src="../Images/Cartel_correcto.png" alt="Cartel correcto" width="350"
            style="display: block;">
    </div>
</body>

</html>
